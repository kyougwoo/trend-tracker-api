<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Trend Tracker</title>
<style>
:root {
  --bg: #0d1117; --card: #161b22; --border: #30363d;
  --text: #e6edf3; --dim: #8b949e; --green: #3fb950;
  --red: #f85149; --blue: #58a6ff; --yellow: #d29922;
  --orange: #db6d28;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; -webkit-tap-highlight-color: transparent;
}
.header {
  position: sticky; top:0; z-index:10;
  background: var(--bg); border-bottom: 1px solid var(--border);
  padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
}
.header h1 { font-size: 18px; font-weight: 700; }
.status {
  font-size: 11px; padding: 3px 8px; border-radius: 12px;
  font-weight: 600;
}
.status.connected { background: #1a3a2a; color: var(--green); }
.status.disconnected { background: #3a1a1a; color: var(--red); }
.status.connecting { background: #3a2a1a; color: var(--yellow); }

.toolbar {
  padding: 8px 16px; display: flex; gap: 8px;
  border-bottom: 1px solid var(--border); overflow-x: auto;
}
.toolbar button {
  background: var(--card); color: var(--dim); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 14px; font-size: 13px; white-space: nowrap;
  cursor: pointer; font-weight: 500;
}
.toolbar button:active { background: var(--border); }
.toolbar button.active { border-color: var(--blue); color: var(--blue); }

.cards { padding: 8px; display: flex; flex-direction: column; gap: 8px; }

.stock-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px;
  transition: border-color 0.3s;
}
.stock-card.flash { border-color: var(--blue); }
.stock-card .top { display: flex; justify-content: space-between; align-items: flex-start; }
.stock-card .name { font-size: 16px; font-weight: 700; }
.stock-card .ticker { font-size: 12px; color: var(--dim); margin-top: 2px; }
.stock-card .signal {
  font-size: 12px; font-weight: 700; padding: 3px 10px;
  border-radius: 6px; letter-spacing: 0.5px;
}
.signal-BUY { background: #1a3a2a; color: var(--green); }
.signal-SELL { background: #3a1a1a; color: var(--red); }
.signal-HOLD { background: #1a2a3a; color: var(--blue); }
.signal-WAIT { background: #2a2a1a; color: var(--yellow); }
.signal-- { background: var(--border); color: var(--dim); }

.stock-card .price-row {
  display: flex; align-items: baseline; gap: 10px; margin-top: 10px;
}
.stock-card .price { font-size: 22px; font-weight: 700; }
.stock-card .change { font-size: 14px; font-weight: 600; }
.stock-card .change.up { color: var(--red); }
.stock-card .change.down { color: var(--blue); }

.stock-card .details {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin-top: 12px;
}
.stock-card .detail-item { text-align: center; }
.stock-card .detail-label { font-size: 10px; color: var(--dim); text-transform: uppercase; }
.stock-card .detail-value { font-size: 13px; font-weight: 600; margin-top: 2px; }

.stock-card .meta {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border);
}
.stock-card .meta span { font-size: 11px; color: var(--dim); }
.badge-vol { color: var(--orange) !important; font-weight: 600; }
.badge-fork { color: var(--green) !important; font-weight: 600; }

.alert-banner {
  position: fixed; top: 60px; left: 8px; right: 8px; z-index: 100;
  padding: 12px 16px; border-radius: 10px;
  font-size: 14px; font-weight: 600; text-align: center;
  animation: slideDown 0.3s ease, fadeOut 0.5s 3.5s forwards;
}
.alert-banner.buy { background: #1a3a2a; color: var(--green); border: 1px solid var(--green); }
.alert-banner.sell { background: #3a1a1a; color: var(--red); border: 1px solid var(--red); }
@keyframes slideDown { from { transform: translateY(-100%); opacity:0; } to { transform: translateY(0); opacity:1; } }
@keyframes fadeOut { to { opacity:0; pointer-events:none; } }

.empty {
  text-align: center; color: var(--dim); padding: 60px 20px;
  font-size: 15px; line-height: 1.6;
}

.updated-bar {
  text-align: center; padding: 6px; font-size: 11px; color: var(--dim);
}

.filter-row {
  padding: 6px 16px; display: flex; gap: 6px; overflow-x: auto;
}
.filter-btn {
  background: none; border: 1px solid var(--border); color: var(--dim);
  border-radius: 14px; padding: 4px 12px; font-size: 12px; cursor: pointer;
}
.filter-btn.active { border-color: var(--blue); color: var(--blue); background: #1a2a3a; }
</style>
</head>
<body>

<div class="header">
  <h1>Trend Tracker</h1>
  <span id="connStatus" class="status connecting">연결 중...</span>
</div>

<div class="toolbar">
  <button id="btnSubscribeAll" class="active">전체 구독</button>
  <button id="btnRefresh">새로고침</button>
</div>

<div class="filter-row">
  <button class="filter-btn active" data-filter="ALL">전체</button>
  <button class="filter-btn" data-filter="BUY">BUY</button>
  <button class="filter-btn" data-filter="SELL">SELL</button>
  <button class="filter-btn" data-filter="HOLD">HOLD</button>
  <button class="filter-btn" data-filter="WAIT">WAIT</button>
</div>

<div id="updatedBar" class="updated-bar"></div>
<div id="cards" class="cards">
  <div class="empty">연결 중입니다...<br>잠시만 기다려 주세요</div>
</div>

<div id="alertContainer"></div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
(function() {
  const API = location.origin;
  const stocks = {};
  let currentFilter = 'ALL';
  let useSocket = true;
  let socket = null;
  let fallbackTimer = null;

  const statusEl = document.getElementById('connStatus');

  // --- REST API 폴백 ---
  function fetchViaREST() {
    fetch(API + '/api/stocks')
      .then(r => r.json())
      .then(res => {
        if (res.ok && res.data) {
          res.data.forEach(s => { stocks[s.ticker] = s; });
          renderCards();
          statusEl.textContent = 'API';
          statusEl.className = 'status connected';
          document.getElementById('updatedBar').textContent = '갱신: ' + res.updated;
        }
      })
      .catch(e => {
        statusEl.textContent = '오류';
        statusEl.className = 'status disconnected';
      });
  }

  // --- Socket.IO 연결 시도 (5초 후 실패 시 REST 폴백) ---
  try {
    socket = io(API, {
      transports: ['polling', 'websocket'],
      reconnectionAttempts: 3,
      timeout: 5000
    });

    // 5초 내 연결 안 되면 REST 폴백
    fallbackTimer = setTimeout(() => {
      if (!socket.connected) {
        console.log('Socket.IO timeout, falling back to REST API');
        useSocket = false;
        fetchViaREST();
        // REST 폴링 시작 (60초 간격)
        setInterval(fetchViaREST, 60000);
      }
    }, 5000);

    socket.on('connect', () => {
      clearTimeout(fallbackTimer);
      useSocket = true;
      statusEl.textContent = '실시간';
      statusEl.className = 'status connected';
      socket.emit('subscribe_all');
    });
    socket.on('disconnect', () => {
      statusEl.textContent = '연결 끊김';
      statusEl.className = 'status disconnected';
    });
    socket.on('connect_error', (err) => {
      console.log('Socket.IO error:', err.message);
      statusEl.textContent = '재연결 중...';
      statusEl.className = 'status connecting';
    });
  } catch(e) {
    // Socket.IO 로드 실패 시 REST 폴백
    useSocket = false;
    fetchViaREST();
    setInterval(fetchViaREST, 60000);
  }

  // --- Buttons ---
  document.getElementById('btnSubscribeAll').addEventListener('click', () => {
    if (socket && socket.connected) socket.emit('subscribe_all');
    else fetchViaREST();
  });
  document.getElementById('btnRefresh').addEventListener('click', () => {
    document.getElementById('btnRefresh').textContent = '로딩...';
    if (socket && socket.connected) {
      socket.emit('request_refresh');
    } else {
      fetchViaREST();
    }
    setTimeout(() => { document.getElementById('btnRefresh').textContent = '새로고침'; }, 2000);
  });

  // --- Filter ---
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderCards();
    });
  });

  // --- Socket Stock Updates ---
  if (socket) {
    socket.on('stock_update', (data) => {
      stocks[data.ticker] = data;
      renderCards();
      flashCard(data.ticker);
    });

    socket.on('refresh_complete', (data) => {
      document.getElementById('updatedBar').textContent = '갱신: ' + data.at;
    });

    socket.on('signal_change', (alert) => {
      showAlert(alert);
      if ('vibrate' in navigator) navigator.vibrate(200);
    });
  }

  function showAlert(alert) {
    const el = document.createElement('div');
    const isBuy = alert.new_signal === 'BUY';
    el.className = 'alert-banner ' + (isBuy ? 'buy' : 'sell');
    el.textContent = alert.name + ' ' + alert.old_signal + ' → ' + alert.new_signal;
    document.getElementById('alertContainer').appendChild(el);
    setTimeout(() => el.remove(), 4500);
  }

  function flashCard(ticker) {
    const el = document.getElementById('card-' + ticker);
    if (!el) return;
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 600);
  }

  // --- Rendering ---
  function formatPrice(n) {
    return n ? n.toLocaleString('ko-KR') : '-';
  }

  function renderCards() {
    const container = document.getElementById('cards');
    const priority = { BUY:0, SELL:1, HOLD:2, WAIT:3, '--':4 };
    let list = Object.values(stocks);

    if (currentFilter !== 'ALL') {
      list = list.filter(s => s.signal === currentFilter);
    }
    list.sort((a, b) => (priority[a.signal]||9) - (priority[b.signal]||9));

    if (list.length === 0) {
      container.innerHTML = '<div class="empty">표시할 종목이 없습니다</div>';
      return;
    }

    container.innerHTML = list.map(s => {
      const isUp = s.change >= 0;
      const changeSign = isUp ? '+' : '';
      const changePctSign = isUp ? '+' : '';
      const changeClass = isUp ? 'up' : 'down';
      const badges = [];
      if (s.volStrong) badges.push('<span class="badge-vol">거래량↑</span>');
      if (s.forking) badges.push('<span class="badge-fork">이격확대</span>');

      return '<div class="stock-card" id="card-' + s.ticker + '">' +
        '<div class="top">' +
          '<div><div class="name">' + s.name + '</div><div class="ticker">' + s.ticker + '</div></div>' +
          '<span class="signal signal-' + s.signal + '">' + s.signal + '</span>' +
        '</div>' +
        '<div class="price-row">' +
          '<span class="price">' + formatPrice(s.close) + '</span>' +
          '<span class="change ' + changeClass + '">' + changeSign + formatPrice(s.change) +
            ' (' + changePctSign + s.change_pct + '%)</span>' +
        '</div>' +
        '<div class="details">' +
          '<div class="detail-item"><div class="detail-label">MA5</div><div class="detail-value">' + formatPrice(s.ma5) + '</div></div>' +
          '<div class="detail-item"><div class="detail-label">MA10</div><div class="detail-value">' + formatPrice(s.ma10) + '</div></div>' +
          '<div class="detail-item"><div class="detail-label">MA20</div><div class="detail-value">' + formatPrice(s.ma20) + '</div></div>' +
        '</div>' +
        '<div class="meta">' +
          '<span>' + s.alignment + ' | ' + s.date + '</span>' +
          '<span>' + badges.join(' ') + '</span>' +
        '</div>' +
      '</div>';
    }).join('');

    if (list.length > 0 && list[0].updated) {
      document.getElementById('updatedBar').textContent = '최종 갱신: ' + list[0].updated;
    }
  }
})();
</script>
</body>
</html>
