## STEP 5 — Render 자동 재배포 확인

GitHub 파일 3개 교체 완료되면 **Render가 자동으로 재배포** 시작해요!

**1.** [dashboard.render.com](https://dashboard.render.com) → 서비스 클릭

**2.** 상단에 노란색 **`Deploying...`** 표시 확인

**3.** 1~2분 후 초록색 **`Live`** 로 바뀌면 완료 ✅

